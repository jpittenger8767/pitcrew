# Site settings
title: "Dark Horse Robotics"
description: "https://github.com/nbrobotics/teamWebsite"
url: ""
baseurl: ""

# Team configuration
site:
  team_name: "Dark Horse Robotics"
  team_number: "8767"
  program: "FRC"
  current_season: "2025-2026"
  logo: "/assets/images/placeholder.svg"
  # hero_image: "/assets/images/hero.jpg"  # Optional: replaces the hero gradient with a photo

# Theme configuration
# Edit colors here. Changes take effect after restarting Jekyll.
theme:
  colors:
    # Brand colors
    primary: "#003974"
    primary_highlight: "#002042"
    primary_darkest: "#000000"
    secondary: "#000000"
    secondary_highlight: "#000000"
    # Semantic colors
    success: "#28a745"
    info: "#17a2b8"
    warning: "#f0b37e"
    danger: "#dc3545"
    # Sponsor tier border colors
    sponsor_platinum: "#9ca3af"
    sponsor_gold: "#eab308"
    sponsor_silver: "#d1d5db"
    sponsor_bronze: "#92400e"
  dark_mode: true

# Features toggle
features:
  blog: true
  docs: true
  cad_viewer: false
  circuit_viewer: true
  code_links: true
  data_visualizations: true
  alumni_auto_archive: true
  accessibility_toggle: false
  search: true

# Navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about/"
  - title: "Season"
    url: "/season/"
  - title: "Awards"
    url: "/awards/"
  - title: "Sponsors"
    url: "/sponsors/"
  - title: "Docs"
    url: "/docs/"
  - title: "News"
    url: "/news/"

# Social links
socials:
  instagram: "https://www.instagram.com/darkhorse8767/"
  github: "https://github.com/nbrobotics"
  youtube: "https://www.youtube.com/@Darkhorse8767"
  twitter: ""
  email: "darkhorserobotics8767@gmail.com"

# Fundraising/Donations
fundraising:
  enabled: false
  url: ""
  text: "Support Our Team"

# Startup wizard — set to false after initial setup
startup_wizard: false

# Collections
collections:
  posts:
    output: true
    permalink: /news/:year/:month/:day/:title/
  seasons:
    output: true
    permalink: /seasons/:path/
  docs:
    output: true
    permalink: /docs/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "seasons"
    values:
      layout: "season"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "docs"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - tailwind.config.js
  - README.md
  - SPEC.md
  - CLAUDE.md
  - scripts
  - "*.py"
  - requirements.txt
